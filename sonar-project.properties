sonar.projectKey=Task-App-Test
sonar.projectName=Task App Test
sonar.sourceEncoding=UTF-8

# Analyze the complete repository.
sonar.sources=.

# Look for tests throughout the repository.
sonar.tests=.

# Ignore generated files, dependencies and test files as production source.
sonar.exclusions=\
**/node_modules/**,\
**/coverage/**,\
**/build/**,\
**/dist/**,\
**/.git/**,\
**/*.test.js,\
**/*.test.jsx,\
**/*.test.ts,\
**/*.test.tsx,\
**/*.spec.js,\
**/*.spec.jsx,\
**/*.spec.ts,\
**/*.spec.tsx,\
**/__tests__/**

# Identify test files separately.
sonar.test.inclusions=\
**/*.test.js,\
**/*.test.jsx,\
**/*.test.ts,\
**/*.test.tsx,\
**/*.spec.js,\
**/*.spec.jsx,\
**/*.spec.ts,\
**/*.spec.tsx,\
**/__tests__/**

# Frontend coverage currently generated by the workflow.
sonar.javascript.lcov.reportPaths=trainingFronend/coverage/lcov.info
