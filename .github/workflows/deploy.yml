name: CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # 1. TEST AND ANALYZE THE COMPLETE REPOSITORY
  # ============================================================
  sonar_scan:
    name: Test and Analyze Complete Repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Fetch the complete repository and Git history.
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Install Node.js for frontend and backend testing.
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          package-manager-cache: false

      # ----------------------------------------------------------
      # Frontend dependencies and tests
      # ----------------------------------------------------------
      - name: Install frontend dependencies
        run: |
          set -euo pipefail

          npm --prefix trainingFronend ci

      - name: Run frontend tests with coverage
        run: |
          set -euo pipefail

          CI=true npm --prefix trainingFronend test -- \
            --watchAll=false \
            --coverage \
            --passWithNoTests

      # ----------------------------------------------------------
      # Backend dependencies and tests
      # ----------------------------------------------------------
      - name: Install backend dependencies
        run: |
          set -euo pipefail

          if [ -f trainingAppBackend/package-lock.json ]; then
            npm --prefix trainingAppBackend ci
          else
            echo "No backend package-lock.json found; using npm install."
            npm --prefix trainingAppBackend install
          fi

      - name: Run backend tests
        run: |
          set -euo pipefail

          # --if-present prevents failure when the backend does not
          # currently have a test script in package.json.
          CI=true npm --prefix trainingAppBackend run test --if-present

      # ----------------------------------------------------------
      # SonarQube
      # ----------------------------------------------------------
      - name: Verify SonarQube connection
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -euo pipefail

          echo "Checking SonarQube server..."

          RESPONSE="$(
            curl \
              --fail \
              --silent \
              --show-error \
              "${SONAR_HOST_URL}/api/system/status"
          )"

          echo "${RESPONSE}"
          echo "SonarQube server is reachable."

      - name: Analyze complete repository
        uses: SonarSource/sonarqube-scan-action@v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Check SonarQube Quality Gate
        id: sonarqube-quality-gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        with:
          pollingTimeoutSec: 300
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Show Quality Gate result
        run: |
          echo "Quality Gate status: ${{ steps.sonarqube-quality-gate.outputs.quality-gate-status }}"

  # ============================================================
  # 2. BUILD AND PUSH IMAGES
  # ============================================================
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    # This job starts only when tests and Quality Gate pass.
    needs: sonar_scan

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.USER_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./trainingAppBackend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./trainingFronend
          push: true
          build-args: |
            REACT_APP_API_URL=https://devops-2.sociumtech.com
          tags: |
            ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/frontend:latest

  # ============================================================
  # 3. DEPLOY TO K3S
  # ============================================================
  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Deployment starts only after both images are pushed.
    needs: build-and-push

    steps:
      - name: Configure Kubeconfig
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.DEV_KUBE_CONFIG }}

      - name: Verify K3s connection
        run: |
          set -euo pipefail

          echo "Current Kubernetes context:"
          kubectl config current-context

          echo "Cluster nodes:"
          kubectl get nodes

          echo "Frontend deployment:"
          kubectl get deployment frontend -n backend

          echo "Backend deployment:"
          kubectl get deployment backend-api -n backend

      # ----------------------------------------------------------
      # Deploy frontend
      # ----------------------------------------------------------
      - name: Update frontend image
        env:
          IMAGE_TAG: ${{ github.sha }}
          NAMESPACE: backend
          DEPLOYMENT_NAME: frontend
          CONTAINER_NAME: frontend
          IMAGE_REPO: ghcr.io/obadh-20/frontend
        run: |
          set -euo pipefail

          echo "Deploying frontend image:"
          echo "${IMAGE_REPO}:${IMAGE_TAG}"

          kubectl -n "${NAMESPACE}" set image \
            deployment/"${DEPLOYMENT_NAME}" \
            "${CONTAINER_NAME}"="${IMAGE_REPO}:${IMAGE_TAG}"

          kubectl -n "${NAMESPACE}" rollout status \
            deployment/"${DEPLOYMENT_NAME}" \
            --timeout=300s

          echo "Frontend deployment completed successfully."

      # ----------------------------------------------------------
      # Deploy backend
      # ----------------------------------------------------------
      - name: Update backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
          NAMESPACE: backend
          DEPLOYMENT_NAME: backend-api
          CONTAINER_NAME: backend
          IMAGE_REPO: ghcr.io/obadh-20/backend
        run: |
          set -euo pipefail

          echo "Deploying backend image:"
          echo "${IMAGE_REPO}:${IMAGE_TAG}"

          kubectl -n "${NAMESPACE}" set image \
            deployment/"${DEPLOYMENT_NAME}" \
            "${CONTAINER_NAME}"="${IMAGE_REPO}:${IMAGE_TAG}"

          kubectl -n "${NAMESPACE}" rollout status \
            deployment/"${DEPLOYMENT_NAME}" \
            --timeout=300s

          echo "Backend deployment completed successfully."

      - name: Show deployment results
        if: always()
        run: |
          echo "Frontend resources:"
          kubectl get deployment,pods,service \
            -n frontend \
            -o wide || true

          echo
          echo "Backend resources:"
          kubectl get deployment,pods,service \
            -n backend \
            -o wide || true
