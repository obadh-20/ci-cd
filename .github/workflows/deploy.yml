name: CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: task-app-dev-deployment
  cancel-in-progress: true

jobs:
  sonar_scan:
    name: SonarQube Scan
    runs-on:
      - self-hosted
      - linux
      - x64

    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify SonarQube connection
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          curl --fail \
            --silent \
            --show-error \
            "${SONAR_HOST_URL}/api/system/status"

      - name: Run SonarQube analysis
        uses: SonarSource/sonarqube-scan-action@v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

  build-and-push:
    name: Build and Push Images
    needs: sonar_scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.USER_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./trainingAppBackend
          push: true
          tags: |
            ghcr.io/obadh-20/backend:${{ github.sha }}
            ghcr.io/obadh-20/backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./trainingFronend
          push: true
          build-args: |
            REACT_APP_API_URL=https://devops-2.sociumtech.com
          tags: |
            ghcr.io/obadh-20/frontend:${{ github.sha }}
            ghcr.io/obadh-20/frontend:latest

  deploy:
    name: Deploy to K3s
    needs: build-and-push
    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Configure Kubeconfig
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.DEV_KUBE_CONFIG }}

      - name: Verify K3s connection
        run: |
          echo "Current Kubernetes context:"
          kubectl config current-context

          echo "Checking cluster connection:"
          kubectl get nodes

          echo "Checking target namespaces:"
          kubectl get namespace frontend
          kubectl get namespace backend

      - name: Update frontend image
        env:
          IMAGE_TAG: ${{ github.sha }}
          NAMESPACE: frontend
          DEPLOYMENT_NAME: frontend
          CONTAINER_NAME: frontend
          IMAGE_REPO: ghcr.io/obadh-20/frontend
        run: |
          set -euo pipefail

          kubectl -n "${NAMESPACE}" set image \
            deployment/"${DEPLOYMENT_NAME}" \
            "${CONTAINER_NAME}"="${IMAGE_REPO}:${IMAGE_TAG}"

          kubectl -n "${NAMESPACE}" rollout status \
            deployment/"${DEPLOYMENT_NAME}" \
            --timeout=180s

          echo "Frontend deployment completed successfully."

      - name: Update backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
          NAMESPACE: backend
          DEPLOYMENT_NAME: backend-api
          CONTAINER_NAME: backend
          IMAGE_REPO: ghcr.io/obadh-20/backend
        run: |
          set -euo pipefail

          kubectl -n "${NAMESPACE}" set image \
            deployment/"${DEPLOYMENT_NAME}" \
            "${CONTAINER_NAME}"="${IMAGE_REPO}:${IMAGE_TAG}"

          kubectl -n "${NAMESPACE}" rollout status \
            deployment/"${DEPLOYMENT_NAME}" \
            --timeout=180s

          echo "Backend deployment completed successfully."

      - name: Show deployed resources
        run: |
          echo "Frontend:"
          kubectl get deployment,pods,service -n frontend -o wide

          echo "Backend:"
          kubectl get deployment,pods,service -n backend -o wide
