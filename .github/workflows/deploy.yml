name: CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # 1. SONARQUBE ANALYSIS
  # ============================================================
  sonar_scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # SonarQube works better with complete Git history.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: trainingFronend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix trainingFronend

      - name: Run frontend tests
        run: |
          CI=true npm --prefix trainingFronend test -- \
            --watchAll=false \
            --coverage \
            --passWithNoTests

      - name: Verify SonarQube connection
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          curl --fail \
            --silent \
            --show-error \
            "${SONAR_HOST_URL}/api/system/status"

      - name: Run SonarQube analysis
        uses: SonarSource/sonarqube-scan-action@v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

  # ============================================================
  # 2. BUILD AND PUSH IMAGES
  # ============================================================
  build-and-push:
    name: Build and Push Images

    # Do not build anything unless SonarQube passes.
    needs: sonar_scan

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.USER_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./trainingAppBackend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./trainingFronend
          push: true
          build-args: |
            REACT_APP_API_URL=https://devops-2.sociumtech.com
          tags: |
            ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/frontend:latest

  # ============================================================
  # 3. DEPLOY TO K3S
  # ============================================================
  deploy:
    name: Deploy to K3s

    # Do not deploy unless images were built successfully.
    needs: build-and-push

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configure Kubeconfig
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.DEV_KUBE_CONFIG }}

      - name: Verify K3s connection
        run: |
          set -euo pipefail

          kubectl config current-context
          kubectl get nodes
          kubectl get deployment frontend -n frontend
          kubectl get deployment backend-api -n backend

      - name: Update frontend image
        env:
          IMAGE_TAG: ${{ github.sha }}
          NAMESPACE: frontend
          DEPLOYMENT_NAME: frontend
          CONTAINER_NAME: frontend
          IMAGE_REPO: ghcr.io/obadh-20/frontend
        run: |
          set -euo pipefail

          kubectl -n "${NAMESPACE}" set image \
            deployment/"${DEPLOYMENT_NAME}" \
            "${CONTAINER_NAME}"="${IMAGE_REPO}:${IMAGE_TAG}"

          kubectl -n "${NAMESPACE}" rollout status \
            deployment/"${DEPLOYMENT_NAME}" \
            --timeout=300s

          echo "Frontend deployment completed successfully."

      - name: Update backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
          NAMESPACE: backend
          DEPLOYMENT_NAME: backend-api
          CONTAINER_NAME: backend
          IMAGE_REPO: ghcr.io/obadh-20/backend
        run: |
          set -euo pipefail

          kubectl -n "${NAMESPACE}" set image \
            deployment/"${DEPLOYMENT_NAME}" \
            "${CONTAINER_NAME}"="${IMAGE_REPO}:${IMAGE_TAG}"

          kubectl -n "${NAMESPACE}" rollout status \
            deployment/"${DEPLOYMENT_NAME}" \
            --timeout=300s

          echo "Backend deployment completed successfully."

      - name: Show deployment results
        if: always()
        run: |
          echo "Frontend resources:"
          kubectl get deployment,pods,service \
            -n frontend \
            -o wide || true

          echo "Backend resources:"
          kubectl get deployment,pods,service \
            -n backend \
            -o wide || true
