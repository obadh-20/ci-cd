name: CI/CD Pipeline
on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.USER_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/backend:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/backend:latest \
            ./trainingAppBackend
          docker push ghcr.io/${{ github.repository_owner }}/backend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/backend:latest

      - name: Build frontend image (with env)
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=https://devops-2.sociumtech.com \
            -t ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/frontend:latest \
            ./trainingFronend
          docker push ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure Kubeconfig
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.DEV_KUBE_CONFIG }}
 
      - name: updating frontend image
        env:
          IMAGE_TAG: ${{ github.sha }}
          NAMESPACE: default
          DEPLOYMENT_NAME: frontend
          CONTAINER_NAME: frontend
          IMAGE_REPO: ghcr.io/obadh-20/frontend
        run: |
          kubectl -n "${NAMESPACE}" set image deployment/"${DEPLOYMENT_NAME}" \
            "${CONTAINER_NAME}"="${IMAGE_REPO}:${IMAGE_TAG}"
 
          kubectl -n "${NAMESPACE}" rollout status deployment/"${DEPLOYMENT_NAME}"
      - name: updating frontend image
        env:
          IMAGE_TAG: ${{ github.sha }}
          NAMESPACE: backend
          DEPLOYMENT_NAME: backend-api
          CONTAINER_NAME: backend
          IMAGE_REPO: ghcr.io/obadh-20/backend
        run: |
          kubectl -n "${NAMESPACE}" set image deployment/"${DEPLOYMENT_NAME}" \
            "${CONTAINER_NAME}"="${IMAGE_REPO}:${IMAGE_TAG}"
 
          kubectl -n "${NAMESPACE}" rollout status deployment/"${DEPLOYMENT_NAME}"
